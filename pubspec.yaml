name: zenshi
description: "A premium manga, manhua, and manhwa reader with offline-first architecture."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Local database - disabled for v1.0 to fix native crash on Samsung devices
  drift: ^2.20.3
  # drift_flutter removed - sqlite3_flutter_libs causes native crash on Samsung

  # Backend / Auth
  supabase_flutter: ^2.8.4
  # firebase_core and firebase_messaging removed - not needed for v1.0

  # Image caching
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1

  # Secure storage
  flutter_secure_storage: ^9.2.4

  # Background tasks
  # workmanager removed - incompatible with current Flutter/Kotlin version

  # Navigation
  go_router: ^14.8.1

  # Preferences
  shared_preferences: ^2.3.3

  # Utilities
  path_provider: ^2.1.5
  connectivity_plus: ^6.1.4
  # local_auth: removed for v1.0 - not needed at startup
  image: ^4.3.0
  http: ^1.3.0

  # Code generation annotations
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.7

  # Localisation
  intl: ^0.20.2

  # UI
  shimmer: ^3.0.0
  flutter_staggered_grid_view: ^0.7.0
  lottie: ^3.3.1
  html: ^0.15.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.4.14
  drift_dev: ^2.20.3
  riverpod_generator: ^2.6.1
  freezed: ^2.5.7
  json_serializable: ^6.9.4

  # Linting
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
